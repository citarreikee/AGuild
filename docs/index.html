<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Adventurer's Guild · Quest Board</title>
  <meta name="description" content="A physical quest board for AI-augmented workers. Post bounties, claim quests, earn gold.">
  <link rel="stylesheet" href="css/guild.css?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏰</text></svg>">
</head>
<body>

  <!-- Wooden Frame -->
  <div class="frame"></div>

  <!-- Board Header — nailed sign -->
  <header class="guild-header">
    <div class="guild-emblem">🏰</div>
    <h1 class="guild-title">Quest Board</h1>
    <p class="guild-subtitle">The Adventurer's Guild · 冒险家公会</p>
  </header>

  <!-- Quest Board -->
  <main class="quest-board" id="quest-board">
    <div class="loading">
      <div class="loading__spinner"></div>
      <p>Scrying the quest board...</p>
    </div>
  </main>

  <!-- Post Quest — small pinned note in corner -->
  <a href="https://github.com/citarreikee/AGuild/issues/new?template=quest.yml"
     class="post-quest-note" target="_blank" rel="noopener"
     title="Post a Quest · 发布悬赏">
    <span class="post-quest-note__pin"></span>
    <span>Post<br>Quest</span>
  </a>

  <!-- Footer -->
  <footer class="guild-footer">
    <a href="https://github.com/citarreikee/AGuild">GitHub</a>
    · <a href="https://github.com/citarreikee/AGuild/blob/main/docs/quest-guide.md">Guide</a>
    · <a href="https://github.com/citarreikee/AGuild/blob/main/docs/guild-rules.md">Rules</a>
    · <a href="https://github.com/citarreikee/AGuild/discussions">Discussions</a>
  </footer>

  <script src="js/issues.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
