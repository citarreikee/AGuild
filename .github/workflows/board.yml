name: Quest Board Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add Open label to new quests
        if: github.event.action == 'opened' && !contains(github.event.issue.labels.*.name, '📋 Open')
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['📋 Open'];
            // If the issue body contains a quest type, add that label too
            const body = context.payload.issue.body || '';
            const typeMap = {
              '⚔️ Code': '⚔️ Code',
              '🎨 Design': '🎨 Design',
              '📜 Writing': '📜 Writing',
              '🔮 AI/ML': '🔮 AI/ML',
              '🧪 Data': '🧪 Data',
              '🛡️ Strategy': '🛡️ Strategy',
              '🎵 Media': '🎵 Media',
            };
            for (const [key, label] of Object.entries(typeMap)) {
              if (body.includes(key)) {
                labels.push(label);
                break;
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
