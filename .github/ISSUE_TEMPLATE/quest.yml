name: 📜 Post a Quest
description: Post a bounty for the Adventurer's Guild
title: "[QUEST] "
labels: ["🟢 Open"]
body:
  - type: markdown
    attributes:
      value: |
        ## Post a Quest to the Guild Board

        Describe what needs doing and what you'll pay. Be specific — better quests attract better adventurers.

  - type: input
    id: quest-title
    attributes:
      label: "Quest Name"
      placeholder: "e.g. Build a Telegram bot that summarizes YouTube videos"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: What needs to be done? Include context, requirements, and any relevant details.
      placeholder: |
        ## Background
        I need a Telegram bot that...

        ## Requirements
        - Takes a YouTube URL as input
        - Returns a structured summary with timestamps
        - Works for English and Chinese videos

        ## Deliverables
        - Working bot deployed somewhere
        - Source code in a GitHub repo
    validations:
      required: true

  - type: input
    id: reward
    attributes:
      label: "💰 Reward (USD)"
      description: How much will you pay for a completed quest?
      placeholder: "e.g. 500"
    validations:
      required: true
