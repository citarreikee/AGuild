name: 📜 Post a Quest
description: Post a bounty for the Adventurer's Guild
title: "[QUEST] "
labels: ["🟢 Open"]
body:
  - type: markdown
    attributes:
      value: |
        ## Post a Quest to the Guild Board

        Describe what needs doing, how you'll pay, and how to reach you. The goal is to get people talking — the rest is between you.

  - type: input
    id: quest-title
    attributes:
      label: "Quest Name"
      placeholder: "e.g. Build a Telegram bot that summarizes YouTube videos"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: What needs to be done? Include context, requirements, and any relevant details.
      placeholder: |
        ## Background
        I need a Telegram bot that...

        ## Requirements
        - Takes a YouTube URL as input
        - Returns a structured summary with timestamps
        - Works for English and Chinese videos

        ## Deliverables
        - Working bot deployed somewhere
        - Source code in a GitHub repo
    validations:
      required: true

  - type: input
    id: reward
    attributes:
      label: "Reward (USD)"
      description: How much will you pay for a completed quest? (Optional — put TBD if unsure)
      placeholder: "e.g. 500"

  - type: input
    id: contact
    attributes:
      label: "Contact"
      description: How should adventurers reach you? Telegram, Discord, email, "comment here" — or "via Jojo" to use the guild founder as intermediary.
      placeholder: "e.g. @username on Telegram / Discord"
    validations:
      required: true
